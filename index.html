<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raco Sushi · Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;
  --b1:#1e1e1e;--b2:#2a2a2a;
  --text:#efefef;--dim:#888;--muted:#444;
  --accent:#c9a96e;--accent2:#a07840;
  --green:#6fcf97;--red:#f87171;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:8rem}

/* ── HEADER ── */
.header{padding:2rem 1.25rem 1.5rem;text-align:center;border-bottom:.5px solid var(--b1)}
.brand{font-family:var(--mono);font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem}
.header h1{font-size:1.5rem;font-weight:300;letter-spacing:-.01em;margin-bottom:.3rem}
.header p{font-size:.82rem;color:var(--dim)}
.dias{display:inline-flex;gap:.35rem;margin-top:.75rem}
.dia{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;padding:.2rem .55rem;border:.5px solid var(--b2);border-radius:3px;color:var(--dim)}

/* ── APP ── */
.app{max-width:560px;margin:0 auto;padding:0 1rem}

/* ── SECTION ── */
.sec-header{padding:1.5rem 0 .6rem;display:flex;justify-content:space-between;align-items:baseline}
.sec-title{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.sec-sub{font-size:.72rem;color:var(--muted)}

/* ── CARD PRODUCTO ── */
.card{background:var(--s1);border:.5px solid var(--b1);border-radius:8px;padding:.85rem;margin-bottom:.4rem;transition:border-color .15s}
.card:hover{border-color:var(--b2)}
.card.sel{border-color:var(--accent2);background:var(--s2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem}
.card-info{flex:1;min-width:0}
.card-name{font-size:.95rem;font-weight:500;line-height:1.2;margin-bottom:.3rem}
.card-desc{font-size:.75rem;color:var(--dim);line-height:1.5}
.card-badges{display:flex;align-items:center;gap:.35rem;margin-top:.4rem;flex-wrap:wrap}
.badge{font-size:.6rem;font-family:var(--mono);padding:.15rem .45rem;border-radius:3px;letter-spacing:.05em}
.b-sal{background:#1a0a0a;color:#f87171;border:.5px solid #2a1010}
.b-tru{background:#0a0f1a;color:#93c5fd;border:.5px solid #101a2a}
.b-lan{background:#120e00;color:#fcd34d;border:.5px solid #1e1800}
.b-pes{background:#060f08;color:#86efac;border:.5px solid #0a1a0e}
.b-iku{background:#100a1a;color:#c4b5fd;border:.5px solid #180f2a}
.b-pic{background:#1a0800;color:#fb923c;border:.5px solid #2a1000}
.b-piezas{background:var(--b1);color:var(--dim);border:.5px solid var(--b2)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:.6rem;flex-shrink:0}
.card-price{font-family:var(--mono);font-size:.92rem;color:var(--accent);white-space:nowrap}
.ctrl{display:flex;align-items:center;gap:.4rem}
.cbtn{width:26px;height:26px;border:.5px solid var(--b2);border-radius:4px;background:transparent;color:var(--dim);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1;user-select:none;-webkit-user-select:none}
.cbtn:active{transform:scale(.9)}
.cbtn:hover{border-color:var(--accent2);color:var(--accent)}
.qval{font-family:var(--mono);font-size:.85rem;min-width:18px;text-align:center;color:var(--text)}

/* ── DATOS CLIENTE ── */
.form-section{margin-top:1.75rem}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.field{display:flex;flex-direction:column;gap:.3rem}
.field.full{grid-column:1/-1}
.field label{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.field input,.field textarea{background:var(--s1);border:.5px solid var(--b2);border-radius:5px;padding:.55rem .7rem;color:var(--text);font-family:var(--sans);font-size:.85rem;outline:none;transition:border-color .15s;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--accent2)}
.field input::placeholder,.field textarea::placeholder{color:var(--muted)}
.addr-row{display:grid;grid-template-columns:1fr auto;gap:.5rem}
.dpto-inp{width:72px}

/* ── BARRA FLOTANTE ── */
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:.5px solid var(--b2);padding:.85rem 1.25rem;z-index:50}
.bar-inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:.75rem}
.bar-info{flex:1}
.bar-count{font-size:.78rem;color:var(--dim)}
.bar-total{font-family:var(--mono);font-size:1.05rem;font-weight:500;color:var(--accent)}
.bar-btn{background:var(--accent);color:#0a0a0a;border:none;border-radius:6px;padding:.65rem 1.5rem;font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap}
.bar-btn:hover{background:#d4b87a}
.bar-btn:disabled{background:var(--b2);color:var(--muted);cursor:default}

/* ── MODAL CONFIRMACIÓN ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--s1);border-top:.5px solid var(--b2);border-radius:12px 12px 0 0;width:100%;max-width:560px;padding:1.25rem 1.25rem 2rem;max-height:85vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s}
.overlay.show .modal{transform:translateY(0)}
.modal-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.confirm-item{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:.5px solid var(--b1);font-size:.85rem}
.confirm-item:last-of-type{border-bottom:none}
.confirm-item span:last-child{font-family:var(--mono);color:var(--accent)}
.confirm-divider{height:.5px;background:var(--b2);margin:.75rem 0}
.confirm-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.25rem}
.confirm-total span:first-child{font-size:.9rem;color:var(--dim)}
.confirm-total span:last-child{font-family:var(--mono);font-size:1.2rem;font-weight:500;color:var(--accent)}
.confirm-cliente{background:var(--s2);border-radius:6px;padding:.75rem;margin-bottom:1.25rem;font-size:.8rem;color:var(--dim);line-height:1.7}
.confirm-cliente strong{color:var(--text)}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.mbtn{padding:.65rem;border-radius:6px;font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;border:none;font-weight:500}
.mbtn.wa{background:#1a3a22;color:#86efac;border:.5px solid #2d5c37}
.mbtn.wa:hover{background:#1f4428}
.mbtn.back{background:transparent;border:.5px solid var(--b2);color:var(--dim)}
.mbtn.back:hover{border-color:var(--dim);color:var(--text)}

/* ── EMPTY ── */
.empty-bar{text-align:center;padding:.65rem 0;font-size:.78rem;color:var(--muted)}

/* ── MOBILE ── */
@media(max-width:420px){.fields{grid-template-columns:1fr}.modal-btns{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="brand">Sushi · San Isidro</div>
  <h1>Raco Sushi</h1>
  <p>Pedidos · Jueves, Viernes y Sábado</p>
  <div class="dias">
    <span class="dia">JUE</span>
    <span class="dia">VIE</span>
    <span class="dia">SÁB</span>
  </div>
</div>

<div class="app">

  <!-- ROLLS -->
  <div class="sec-header">
    <span class="sec-title">Rolls</span>
    <span class="sec-sub">8 piezas · Uramaki</span>
  </div>
  <div id="list-rolls"></div>

  <!-- NIGIRIS -->
  <div class="sec-header" style="margin-top:.5rem">
    <span class="sec-title">Nigiris</span>
    <span class="sec-sub">por pieza · par = $5.000</span>
  </div>
  <div id="list-nigiris"></div>

  <!-- DATOS CLIENTE -->
  <div class="form-section">
    <div class="sec-header" style="padding-top:0">
      <span class="sec-title">Tus datos</span>
    </div>
    <div class="fields">
      <div class="field"><label>Nombre</label><input type="text" id="f-nombre" placeholder="Tu nombre" autocomplete="off"></div>
      <div class="field"><label>Teléfono <span style="color:#fb923c">*</span></label><input type="tel" id="f-tel" placeholder="11 2345-6789" autocomplete="off" required></div>
      <div class="field full">
        <label>Dirección</label>
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:.5rem">
          <input type="text" id="f-addr" placeholder="Calle" autocomplete="off">
          <input type="text" id="f-numero" placeholder="Nro" autocomplete="off" style="width:72px">
          <input type="text" id="f-dpto" placeholder="Piso/Dpto" autocomplete="off" style="width:90px">
        </div>
      </div>
      <div class="field full">
        <label>Localidad</label>
        <input type="text" id="f-localidad" placeholder="Ej: San Isidro, Martínez, Acassuso..." autocomplete="off">
      </div>
      <div class="field full">
        <label>Nota (opcional)</label>
        <textarea id="f-nota" rows="2" placeholder="Sin cebolla, alergia a..."></textarea>
      </div>
    </div>
  </div>

</div>

<!-- BARRA FLOTANTE -->
<div class="bar">
  <div class="bar-inner">
    <div class="bar-info">
      <div class="bar-count" id="bar-count">Seleccioná productos</div>
      <div class="bar-total" id="bar-total"></div>
    </div>
    <button class="bar-btn" id="bar-btn" onclick="abrirConfirm()" disabled>Ver pedido →</button>
  </div>
</div>

<!-- MODAL CONFIRMACIÓN -->
<div class="overlay" id="overlay" onclick="cerrarConfirmFuera(event)">
  <div class="modal" id="modal">
    <div class="modal-title">Confirmá tu pedido</div>
    <div id="confirm-items"></div>
    <div class="confirm-divider"></div>
    <div class="confirm-total" style="padding-bottom:.4rem;margin-bottom:.4rem;border-bottom:.5px solid #1e1e1e">
      <span>Subtotal</span>
      <span id="confirm-subtotal-val"></span>
    </div>
    <div class="confirm-total" style="margin-bottom:.5rem">
      <span style="font-size:.8rem">Envío</span>
      <span style="font-family:var(--mono);font-size:.85rem;color:var(--dim)">$2.500</span>
    </div>
    <div class="confirm-total">
      <span>Total</span>
      <span id="confirm-total-val"></span>
    </div>
    <div style="background:#111;border-radius:6px;padding:.75rem;margin-top:.75rem">
      <div style="font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#444;margin-bottom:.65rem">¿Cómo pagás?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
        <button id="btn-pago-mp" onclick="seleccionarPago('mp')"
          style="padding:.6rem .4rem;border-radius:6px;border:.5px solid #2a2a2a;background:transparent;color:#888;font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;line-height:1.4">
          Mercado Pago
        </button>
        <button id="btn-pago-ef" onclick="seleccionarPago('efectivo')"
          style="padding:.6rem .4rem;border-radius:6px;border:.5px solid #2a2a2a;background:transparent;color:#888;font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;line-height:1.4">
          Efectivo<br><span id="label-efectivo" style="color:#6fcf97;font-size:.65rem"></span>
        </button>
      </div>
      <div id="pago-info" style="display:none;margin-top:.6rem"></div>
      <div id="pago-mp-volver" style="display:none;margin-top:.75rem;background:#0a1a0a;border-radius:6px;padding:.75rem;text-align:center">
        <div style="font-size:.75rem;color:#6fcf97;margin-bottom:.5rem">¿Ya pagaste en Mercado Pago?</div>
        <div style="font-size:.7rem;color:#444;margin-bottom:.65rem">Confirmá tu pedido para que lo recibamos</div>
        <button onclick="enviarPedido()" style="width:100%;padding:.6rem;background:#1a3a22;color:#86efac;border:.5px solid #2d5c37;border-radius:6px;font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-weight:500">
          Confirmar pedido por WhatsApp →
        </button>
      </div>
    </div>
    <div class="confirm-cliente" id="confirm-cliente"></div>
    <div class="modal-btns" style="margin-top:.75rem">
      <button class="mbtn back" onclick="cerrarConfirm()">← Editar</button>
      <button class="mbtn wa" id="btn-enviar" onclick="enviarPedidoConPago()" disabled
        style="opacity:.4;cursor:default">Elegí forma de pago</button>
    </div>
  </div>
</div>

<script>
const WA_NUM = '5493816174410'

const ROLLS = [
  // Salmon
  {
    n:'NY Phila', wa:'NY Phila', p:'Salmon', v:10000, spicy:0,
    desc:'Salmón, queso crema, palta, sésamo'
  },
  {
    n:'Salmón · Palta', wa:'Salmon Palta', p:'Salmon', v:10000, spicy:0,
    desc:'Salmón, palta, sésamo negro'
  },
  // Trucha
  {
    n:'Maracuyá', wa:'Maracuya', p:'Trucha', v:13000, spicy:0,
    desc:'Trucha, palta, salsa agridulce de maracuyá, masa filo crocante'
  },
  {
    n:'Ají Roll', wa:'Aji Roll', p:'Trucha', v:13000, spicy:0,
    desc:'Trucha, palta, salsa ají amarillo nikkei, hilos de cebolla crocante'
  },
  {
    n:'Spicy Trucha 🌶', wa:'Spicy Trucha', p:'Trucha', v:13000, spicy:1,
    desc:'Trucha, palta, spicy mayo nikkei, quinoa crocante'
  },
  {
    n:'Krein', wa:'Krein', p:'Pesca blanca', v:13000, spicy:0,
    desc:'Tartar de pesca blanca, negui, migas de tempura'
  },
  // Pesca blanca
  {
    n:'Acevichado', wa:'Acevichado', p:'Pesca blanca', v:13000, spicy:0,
    desc:'Pesca blanca, palta, salsa acevichada nikkei, maíz crocante'
  },
  {
    n:'Shiro', wa:'Shiro', p:'Pesca blanca', v:13000, spicy:0,
    desc:'Pesca blanca, crema de palta, salsa miso, cebollín'
  },
  // Langostino
  {
    n:'Ebi Furai', wa:'Ebi Furai', p:'Langostino', v:10000, spicy:0,
    desc:'Langostino apanado en panko, queso crema, palta'
  },
  {
    n:'Rocoto Lango 🌶', wa:'Rocoto Lango', p:'Langostino', v:13000, spicy:1,
    desc:'Langostino apanado en panko, rocoto mayo, ralladura de limón'
  },
  {
    n:'Kimchi Lango', wa:'Kimchi Lango', p:'Langostino', v:13000, spicy:0,
    desc:'Langostino apanado en panko, queso crema, kimchi mayo, furikake de frutos secos'
  },
]

const NIGIRIS = [
  // Trucha
  {
    n:'Trucha Chalaquita', wa:'Trucha Chalaquita', p:'Trucha', v:2500, spicy:0,
    desc:'Trucha, ají amarillo nikkei, chalaquita criolla'
  },
  {
    n:'Trucha Flambeada', wa:'Trucha Flambeada', p:'Trucha', v:2500, spicy:0,
    desc:'Trucha flambeada, salsa tare'
  },
  {
    n:'Trucha Filo Maracuyá', wa:'Trucha Filo Maracuya', p:'Trucha', v:2500, spicy:0,
    desc:'Trucha, reducción de maracuyá, masa filo crocante'
  },
  {
    n:'Trucha Trufa Lima', wa:'Trucha Trufa Lima', p:'Trucha', v:2500, spicy:0,
    desc:'Trucha, aceite de trufa negra, ralladura de lima'
  },
  // Pesca blanca
  {
    n:'Pesca Rocoto 🌶', wa:'Pesca Rocoto', p:'Pesca blanca', v:2500, spicy:1,
    desc:'Pesca blanca, rocoto mayo, hilos de cebolla frita'
  },
  {
    n:'Pesca Kimchi', wa:'Pesca Kimchi', p:'Pesca blanca', v:2500, spicy:0,
    desc:'Pesca blanca, kimchi mayo, furikake'
  },
  {
    n:'Pesca Acevichada', wa:'Pesca Acevichada', p:'Pesca blanca', v:2500, spicy:0,
    desc:'Pesca blanca, salsa acevichada, maíz crocante'
  },
  // Langostino
  {
    n:'Langostino', wa:'Langostino', p:'Langostino', v:2500, spicy:0,
    desc:'Langostino, teriyaki, negui'
  },
  // Ikura
  {
    n:'Ikura', wa:'Ikura', p:'Ikura', v:2500, spicy:0,
    desc:'Shari, banda de nori, imitación de huevas de salmón'
  },
]

const BADGE = {
  'Salmon':'b-sal','Trucha':'b-tru','Langostino':'b-lan',
  'Pesca blanca':'b-pes','Ikura':'b-iku'
}

const rq = new Array(ROLLS.length).fill(0)
const nq = new Array(NIGIRIS.length).fill(0)
const $ = id => document.getElementById(id)
const money = n => '$' + Math.round(n).toLocaleString('es-AR')

// ── Build lists ───────────────────────────────────────────────────
function buildList(items, qtys, prefix, cid) {
  const el = $(cid); el.innerHTML = ''
  items.forEach((it, i) => {
    const d = document.createElement('div')
    d.className = 'card' + (qtys[i] > 0 ? ' sel' : '')
    d.id = `${prefix}-card-${i}`
    const picBadge = it.spicy === 1
      ? '<span class="badge b-pic">🌶 Picante</span>'
      : it.spicy === 2 ? '<span class="badge b-pic">🌶🌶 Muy picante</span>' : ''
    const piezas = prefix === 'r'
      ? '<span class="badge b-piezas">8 pzas</span>'
      : '<span class="badge b-piezas">1 pieza</span>'
    d.innerHTML = `
      <div class="card-top">
        <div class="card-info">
          <div class="card-name">${it.n}</div>
          <div class="card-desc">${it.desc}</div>
          <div class="card-badges">
            <span class="badge ${BADGE[it.p] || 'b-pes'}">${it.p}</span>
            ${piezas}
            ${picBadge}
          </div>
        </div>
        <div class="card-right">
          <div class="card-price">${money(it.v)}</div>
          <div class="ctrl">
            <button class="cbtn" onclick="chg('${prefix}',${i},-1)">−</button>
            <span class="qval" id="${prefix}-q-${i}">0</span>
            <button class="cbtn" onclick="chg('${prefix}',${i},1)">+</button>
          </div>
        </div>
      </div>
    `
    el.appendChild(d)
  })
}

function chg(prefix, i, delta) {
  const isR = prefix === 'r'
  const qtys = isR ? rq : nq
  const items = isR ? ROLLS : NIGIRIS
  qtys[i] = Math.max(0, qtys[i] + delta)
  $(`${prefix}-q-${i}`).textContent = qtys[i]
  $(`${prefix}-card-${i}`).className = 'card' + (qtys[i] > 0 ? ' sel' : '')
  calcBar()
}

// ── Barra flotante ────────────────────────────────────────────────
function calcBar() {
  let total = 0, cnt = 0
  ROLLS.forEach((it, i)   => { total += it.v * rq[i]; cnt += rq[i] })
  NIGIRIS.forEach((it, i) => { total += it.v * nq[i]; cnt += nq[i] })
  const btn = $('bar-btn')
  if (cnt > 0) {
    $('bar-count').textContent = cnt + ' producto' + (cnt !== 1 ? 's' : '')
    $('bar-total').textContent = money(total)
    btn.disabled = false
  } else {
    $('bar-count').textContent = 'Seleccioná productos'
    $('bar-total').textContent = ''
    btn.disabled = true
  }
}

// ── Confirmación ──────────────────────────────────────────────────
function abrirConfirm() {
  // Validar datos mínimos
  const nombre = $('f-nombre').value.trim()
  const tel    = $('f-tel').value.trim()
  const addr   = $('f-addr').value.trim()
  if (!nombre) { $('f-nombre').focus(); alert('Por favor ingresá tu nombre'); return }
  if (!tel)    { $('f-tel').focus();    alert('Por favor ingresá tu teléfono — lo necesitamos para avisarte cuando tu pedido está en camino'); return }
  if (!addr)   { $('f-addr').focus();   alert('Por favor ingresá tu dirección'); return }

  let total = 0
  const lines = []
  ROLLS.forEach((it, i)   => { if (rq[i] > 0) { lines.push({ n: it.n, q: rq[i], sub: it.v * rq[i] }); total += it.v * rq[i] } })
  NIGIRIS.forEach((it, i) => { if (nq[i] > 0) { lines.push({ n: it.n, q: nq[i], sub: it.v * nq[i] }); total += it.v * nq[i] } })

  $('confirm-items').innerHTML = lines.map(l =>
    `<div class="confirm-item"><span>${l.q}× ${l.n}</span><span>${money(l.sub)}</span></div>`
  ).join('')

  $('confirm-subtotal-val').textContent = money(total)
  $('confirm-total-val').textContent = money(total + 2500)
  $('label-efectivo').textContent = money(Math.round((total + 2500) * 0.9)) + ' (10% OFF)'
  // Reset selector de pago
  metodoPago = null
  $('pago-info').style.display = 'none'
  $('btn-pago-mp').style.background = 'transparent'
  $('btn-pago-mp').style.color = '#888'
  $('btn-pago-mp').style.borderColor = '#2a2a2a'
  $('btn-pago-ef').style.background = 'transparent'
  $('btn-pago-ef').style.color = '#888'
  $('btn-pago-ef').style.borderColor = '#2a2a2a'
  $('btn-enviar').disabled = true
  $('btn-enviar').style.opacity = '.4'
  $('btn-enviar').style.cursor = 'default'
  $('btn-enviar').textContent = 'Elegí forma de pago'

  const dpto      = $('f-dpto').value.trim()
  const numero    = $('f-numero').value.trim()
  const localidad = $('f-localidad').value.trim()
  const nota      = $('f-nota').value.trim()
  const addrFull  = [addr + (numero ? ' ' + numero : ''), dpto, localidad].filter(Boolean).join(', ')
  $('confirm-cliente').innerHTML =
    `<strong>${nombre}</strong> · ${tel}<br>` +
    `📍 ${addrFull}` +
    (nota ? `<br>📝 ${nota}` : '')

  $('overlay').classList.add('show')
  document.body.style.overflow = 'hidden'
}

function cerrarConfirm() {
  $('overlay').classList.remove('show')
  document.body.style.overflow = ''
}

function cerrarConfirmFuera(e) {
  if (e.target === $('overlay')) cerrarConfirm()
}

let metodoPago = null

function seleccionarPago(tipo) {
  metodoPago = tipo
  const mp = $('btn-pago-mp'), ef = $('btn-pago-ef')
  // Reset ambos
  mp.style.background = 'transparent'; mp.style.color = '#888'; mp.style.borderColor = '#2a2a2a'
  ef.style.background = 'transparent'; ef.style.color = '#888'; ef.style.borderColor = '#2a2a2a'
  // Activar el seleccionado
  if(tipo === 'mp') {
    mp.style.background = '#003d5c'; mp.style.color = '#009ee3'; mp.style.borderColor = '#009ee3'
    $('pago-info').style.display = 'block'
    const totalVal=$('confirm-total-val').textContent
    const montoNum=totalVal.replace(/\./g,'').replace('$','').trim()
    $('pago-info').innerHTML = `
      <div style="background:#001f2e;border:.5px solid #009ee3;border-radius:6px;padding:.65rem .75rem;margin-bottom:.5rem">
        <div style="font-family:var(--mono);font-size:.6rem;color:#009ee3;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem">Monto a ingresar en MP — tocá para copiar</div>
        <input readonly value="${montoNum}" onclick="this.select()"
          style="width:100%;background:transparent;border:none;font-family:var(--mono);font-size:1.2rem;font-weight:500;color:#fff;outline:none;cursor:pointer;caret-color:transparent">
      </div>
      <a href="https://link.mercadopago.com.ar/racosushi" target="_blank" style="display:block;text-align:center;background:#009ee3;color:#fff;border-radius:6px;padding:.55rem;font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;font-weight:500" onclick="setTimeout(mostrarVolverMP,2000)">Ir a pagar con Mercado Pago →</a>`
    $('pago-mp-volver').style.display = 'none'
  } else {
    ef.style.background = '#0a1f0a'; ef.style.color = '#6fcf97'; ef.style.borderColor = '#6fcf97'
    $('pago-info').style.display = 'none'
  }
  $('btn-enviar').disabled = false
  $('btn-enviar').style.opacity = '1'
  $('btn-enviar').style.cursor = 'pointer'
  $('btn-enviar').textContent = 'Enviar pedido por WhatsApp →'
}

function enviarPedidoConPago() {
  if(!metodoPago) return
  enviarPedido()
}

function copiarMonto(){
  const monto=$('confirm-total-val').textContent.replace(/\./g,'').replace('$','').trim()
  const btn=document.getElementById('btn-copiar-monto')
  // Método compatible con todos los navegadores
  const el=document.createElement('input')
  el.value=monto
  el.style.position='fixed'
  el.style.opacity='0'
  document.body.appendChild(el)
  el.focus()
  el.select()
  try{
    document.execCommand('copy')
    if(btn){btn.textContent='Copiado ✓';btn.style.background='#6fcf97';setTimeout(()=>{btn.textContent='Copiar';btn.style.background='#009ee3'},2000)}
  }catch(e){
    // fallback: mostrar el monto en alerta
    alert('Copiá este monto en MP: '+monto)
  }
  document.body.removeChild(el)
}

function mostrarVolverMP(){
  $('pago-info').style.display = 'none'
  $('pago-mp-volver').style.display = 'block'
  $('btn-enviar').style.display = 'none'
}

// ── Enviar por WA ─────────────────────────────────────────────────
function enviarPedido() {
  const d = new Date()
  const hora = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0')
  const nombre    = $('f-nombre').value.trim()
  const tel       = $('f-tel').value.trim()
  const addr      = $('f-addr').value.trim()
  const numero    = $('f-numero').value.trim()
  const dpto      = $('f-dpto').value.trim()
  const localidad = $('f-localidad').value.trim()
  const nota      = $('f-nota').value.trim()
  const addrFull  = [addr + (numero ? ' ' + numero : ''), dpto, localidad].filter(Boolean).join(', ')

  let total = 0
  const lines = []
  ROLLS.forEach((it, i)   => { if (rq[i] > 0) { lines.push(`- ${rq[i]}x ${it.wa} - ${money(it.v * rq[i])}`); total += it.v * rq[i] } })
  NIGIRIS.forEach((it, i) => { if (nq[i] > 0) { lines.push(`- ${nq[i]}x ${it.wa} - ${money(it.v * nq[i])}`); total += it.v * nq[i] } })

  let msg = 'Hola! Quiero hacer un pedido:\n\n'
  msg += lines.join('\n')
  msg += '\n\nSubtotal: ' + money(total)
  msg += '\nEnvio: $2.500'
  msg += '\nTotal: *' + money(total + 2500) + '*'
  msg += '\n\nNombre: ' + nombre
  msg += '\nTelefono: ' + tel
  msg += '\nDireccion: ' + addrFull
  msg += '\nPago: ' + (metodoPago === 'mp' ? 'Mercado Pago' : 'Efectivo')
  msg += '\nHora del pedido: ' + hora
  if (nota) msg += '\nNota: ' + nota

  const enc = encodeURIComponent(msg)
  window.open(`https://wa.me/${WA_NUM}?text=${enc}`, '_blank')
  cerrarConfirm()
}

// ── Init ──────────────────────────────────────────────────────────
buildList(ROLLS,   rq, 'r', 'list-rolls')
buildList(NIGIRIS, nq, 'n', 'list-nigiris')
calcBar()
</script>
</body>
